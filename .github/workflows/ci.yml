name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-uefi
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --lib -p hboot-config
      - run: cargo test --lib -p hboot
      - run: cargo build --target x86_64-unknown-uefi --release -p hboot-efi
      - run: cargo build --release -p hboot

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-uefi
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --target x86_64-unknown-uefi --release -p hboot-efi
      - run: cargo build --release -p hboot
      - run: |
          mkdir -p artifacts
          cp target/release/hboot artifacts/
          cp target/x86_64-unknown-uefi/release/hboot-efi.efi artifacts/
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/hboot
            artifacts/hboot-efi.efi
          generate_release_notes: true
